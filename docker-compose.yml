services:
  salon:
    build: .
    container_name: salon-platform
    ports:
      - "8080:80"
    environment:
      APP_URL: http://localhost:8080
      SALON_NAME: سالن زیبایی
      ADMIN_EMAIL: admin@salon.local
      ADMIN_PASSWORD: admin123
      ADMIN_NAME: مدیر
    volumes:
      - salon-storage:/var/www/html/backend/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/settings/public"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  salon-storage:
